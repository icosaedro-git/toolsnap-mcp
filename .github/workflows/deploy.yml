name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build site + deploy Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm ci --prefix site
      - run: npm run build:site

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy

      # Post-deploy smoke test: a real MCP initialize against production.
      # Catches routing regressions the asset router can cause (2026-07-07:
      # /mcp returned a bare 405 for a day because run_worker_first didn't
      # list it — every MCP client saw "Server disconnected"). Retries to
      # ride out edge propagation after the deploy.
      - name: Smoke test /mcp (initialize + tools/list)
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/init.json -w '%{http_code}' -X POST https://mcp.toolsnap.app/mcp \
              -H 'content-type: application/json' -H 'accept: application/json, text/event-stream' \
              --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}}}' \
              --max-time 20 || echo 000)
            if [ "$code" = "200" ] && grep -q '"serverInfo"' /tmp/init.json; then break; fi
            echo "attempt $i: HTTP $code — retrying in 10s"; sleep 10
            if [ "$i" = "5" ]; then echo "::error::POST /mcp initialize failed after deploy (HTTP $code)"; cat /tmp/init.json; exit 1; fi
          done
          curl -sSf -X POST https://mcp.toolsnap.app/mcp \
            -H 'content-type: application/json' -H 'accept: application/json, text/event-stream' \
            --data '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' --max-time 20 | grep -q '"tools"'
          curl -sSf https://mcp.toolsnap.app/.well-known/mcp.json --max-time 20 >/dev/null
          echo "smoke test OK: /mcp initialize + tools/list + .well-known"

      # Fase 26 (OAuth 2.1 + DCR) — the anonymous /mcp door above must stay
      # untouched; this checks the ADDITIVE /mcp/oauth door + discovery.
      # Resource server (this Worker) + authorization server (toolsnap-portal,
      # deployed separately) are both checked here since a break in either
      # breaks the whole OAuth connect flow.
      - name: Smoke test OAuth discovery + /mcp/oauth gate
        run: |
          set -euo pipefail
          curl -sSf https://mcp.toolsnap.app/.well-known/oauth-protected-resource --max-time 20 | grep -q '"authorization_servers"'
          curl -sSf https://mcp.toolsnap.app/.well-known/oauth-protected-resource/mcp/oauth --max-time 20 | grep -q '"https://mcp.toolsnap.app/mcp/oauth"'
          curl -sSf https://portal.toolsnap.app/.well-known/oauth-authorization-server --max-time 20 | grep -q '"registration_endpoint"'
          code=$(curl -sS -o /tmp/oauth-401.json -w '%{http_code}' -D /tmp/oauth-401.headers -X POST https://mcp.toolsnap.app/mcp/oauth \
            -H 'content-type: application/json' \
            --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' --max-time 20)
          if [ "$code" != "401" ]; then echo "::error::POST /mcp/oauth without credentials should 401, got $code"; cat /tmp/oauth-401.json; exit 1; fi
          grep -qi '^www-authenticate:' /tmp/oauth-401.headers || { echo "::error::missing WWW-Authenticate header on /mcp/oauth 401"; exit 1; }
          # Plain /mcp must stay anonymous-friendly — OAuth is additive, not a replacement.
          curl -sSf -X POST https://mcp.toolsnap.app/mcp \
            -H 'content-type: application/json' \
            --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","clientInfo":{"name":"ci-smoke-oauth","version":"1.0"}}}' \
            --max-time 20 | grep -q '"serverInfo"'
          echo "smoke test OK: OAuth discovery + /mcp/oauth 401 gate + /mcp still anonymous"
